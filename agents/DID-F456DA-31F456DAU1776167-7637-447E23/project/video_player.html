<!DOCTYPE html>
<html>
<head>
    <title>Video Player</title>
</head>
<body style="margin:0; background:black;">
    <video id="video" width="100%" height="100%" controls autoplay muted loop>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <script>
        const v = document.getElementById('video');
        v.onplay = () => console.log('Video started');
        v.onerror = (e) => console.log('Video error:', v.error);
    </script>
</body>
</html>
